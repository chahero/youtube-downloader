<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="app-header">
            🎥 YouTube Downloader
        </div>

        <div class="input-section">
            <input type="text" id="url" placeholder="YouTube URL 입력">

            <div class="options-row">
                <div class="option-group">
                    <label for="quality">화질:</label>
                    <select id="quality">
                        <option value="best">Best</option>
                        <option value="2160p">2160p (4K)</option>
                        <option value="1440p">1440p (2K)</option>
                        <option value="1080p" selected>1080p (Full HD)</option>
                        <option value="720p">720p (HD)</option>
                        <option value="480p">480p</option>
                        <option value="360p">360p</option>
                    </select>
                </div>

                <div class="option-group">
                    <label for="format">포맷:</label>
                    <select id="format">
                        <option value="video">Video (MP4)</option>
                        <option value="audio_mp3">Audio Only (MP3)</option>
                        <option value="audio_m4a">Audio Only (M4A)</option>
                    </select>
                </div>
            </div>

            <button onclick="startDownload()">다운로드 시작</button>
        </div>

        <!-- 필터 및 검색 -->
        <div class="filter-section">
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">전체</button>
                <button class="filter-btn" data-filter="active" onclick="setFilter('active')">진행중</button>
                <button class="filter-btn" data-filter="completed" onclick="setFilter('completed')">완료</button>
            </div>
            <div class="search-and-actions">
                <input type="text" id="search-input" placeholder="검색..." onkeypress="if(event.key==='Enter')loadDownloads()">
                <button class="search-btn" onclick="loadDownloads()">🔍</button>
                <button class="cleanup-btn" onclick="cleanupDownloads()">🧹 정리</button>
            </div>
        </div>

        <!-- 상태 정보 -->
        <div class="info">
            <span id="status-info">전체: 0건</span>
        </div>

        <!-- 다운로드 목록 -->
        <div id="download-list"></div>

        <!-- 페이지네이션 -->
        <div id="pagination" class="pagination"></div>
    </div>

    <div id="subtitle-viewer" class="subtitle-viewer" aria-hidden="true">
        <div class="subtitle-viewer-backdrop" onclick="closeSubtitleViewer()"></div>
        <div class="subtitle-viewer-dialog" role="dialog" aria-modal="true" aria-labelledby="subtitle-viewer-title">
            <div class="subtitle-viewer-header">
                <div>
                    <div id="subtitle-viewer-title" class="subtitle-viewer-title">자막</div>
                    <div id="subtitle-viewer-filename" class="subtitle-viewer-filename"></div>
                </div>
                <div class="subtitle-viewer-actions">
                    <button class="subtitle-download-btn icon-btn" onclick="downloadSubtitleFromViewer()" title="자막 다운로드" aria-label="자막 다운로드">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16v10H4z"/><path d="M8 19h8"/><path d="M9 9H7v2h2"/><path d="M17 9h-2v2h2"/></svg>
                    </button>
                    <button class="close-btn icon-btn" onclick="closeSubtitleViewer()" title="닫기" aria-label="닫기">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
                    </button>
                </div>
            </div>
            <pre id="subtitle-viewer-content" class="subtitle-viewer-content"></pre>
        </div>
    </div>

    <script>
        let currentFilter = 'all';
        let currentPage = 1;
        let refreshInterval = null;
        let currentSubtitleId = null;
        let shouldAutoRefresh = false;

        const icons = {
            eye: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg>',
            contentDownload: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16v10H4z"/><path d="m10 8 5 2-5 2V8Z"/><path d="M12 17v4m0 0 3-3m-3 3-3-3"/></svg>',
            subtitleDownload: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16v10H4z"/><path d="M8 19h8"/><path d="M9 9H7v2h2"/><path d="M17 9h-2v2h2"/></svg>'
        };

        // 페이지 로드 시
        document.addEventListener('DOMContentLoaded', function() {
            loadDownloads();
            refreshInterval = setInterval(() => {
                if (shouldAutoRefresh) {
                    loadDownloads(false);
                }
            }, 2000);

            document.addEventListener('keydown', function(event) {
                if (event.key === 'Escape') {
                    closeSubtitleViewer();
                }
            });
        });

        // 포맷 선택 시 화질 옵션 비활성화/활성화
        document.getElementById('format').addEventListener('change', function() {
            const qualitySelect = document.getElementById('quality');
            if (this.value.startsWith('audio_')) {
                qualitySelect.disabled = true;
                qualitySelect.style.opacity = '0.5';
            } else {
                qualitySelect.disabled = false;
                qualitySelect.style.opacity = '1';
            }
        });

        function setFilter(filter) {
            currentFilter = filter;
            currentPage = 1;

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === filter);
            });

            loadDownloads();
        }

        async function loadDownloads(showLoading = true) {
            const search = document.getElementById('search-input').value.trim();

            try {
                let url = `/api/downloads?status=${currentFilter}&page=${currentPage}&per_page=10`;
                if (search) {
                    url += `&q=${encodeURIComponent(search)}`;
                }

                const response = await fetch(url);
                const data = await response.json();

                if (!response.ok) {
                    console.error('Error:', data.error);
                    return;
                }

                renderDownloadList(data.items);
                renderPagination(data.page, data.total_pages);
                updateStatusInfo(data.total);
                shouldAutoRefresh = hasPendingWork(data.items);

            } catch (error) {
                console.error('Load error:', error);
            }
        }

        function hasPendingWork(items) {
            return items.some(item => {
                const downloadStatus = item.status;
                const subtitleStatus = item.subtitle_status || 'none';
                return downloadStatus === 'queued' || downloadStatus === 'downloading' ||
                    subtitleStatus === 'queued' || subtitleStatus === 'processing';
            });
        }

        function renderDownloadList(items) {
            const container = document.getElementById('download-list');

            if (items.length === 0) {
                container.innerHTML = '<div class="empty-list">다운로드 항목이 없습니다.</div>';
                return;
            }

            container.innerHTML = items.map(item => {
                const statusClass = item.status;
                const statusIcon = {
                    'downloading': '⏳',
                    'queued': '⏸️',
                    'completed': '✅',
                    'error': '❌',
                    'cancelled': '⚪'
                }[item.status] || '❓';

                const progressBar = item.status === 'downloading' || item.status === 'queued'
                    ? `<div class="progress-bar">
                         <div class="progress" style="width: ${item.progress}%">
                           <span class="progress-text">${item.progress}%</span>
                         </div>
                       </div>`
                    : '';

                const speedText = item.speed ? formatSpeed(item.speed) : '';
                const sizeText = item.file_size ? formatFileSize(item.file_size) : '';

                const qualityBadge = getQualityBadge(item.quality, item.format_type);

                const actionButtons = getActionButtons(item);

                const thumbnail = item.thumbnail || getYoutubeThumbnail(item.url);

                return `
                    <div class="download-item ${statusClass}" id="item-${item.id}">
                        <div class="item-content">
                            ${thumbnail ? `<img src="${thumbnail}" class="video-thumbnail" onclick="openYoutube('${item.url}')" title="유튜브에서 보기" onerror="this.style.display='none'">` : `<div class="video-thumbnail-placeholder" onclick="openYoutube('${item.url}')" title="유튜브에서 보기">🎬</div>`}
                            <div class="item-details">
                                <div class="item-header">
                                    <div class="item-title">
                                        <span class="status-icon">${statusIcon}</span>
                                        <span class="quality-badge">${qualityBadge}</span>
                                        <a href="${item.url}" target="_blank" class="video-link" title="유튜브에서 보기">${item.video_title || 'Unknown'}</a>
                                    </div>
                                    <div class="action-buttons">${actionButtons}</div>
                                </div>
                                <div class="item-meta">
                                    ${item.status === 'downloading' ? `<span>다운로드 중... ${speedText}</span>` : ''}
                                    ${item.status === 'queued' ? `<span>${item.message || '대기 중'}</span>` : ''}
                                    ${item.status === 'completed' ? `<span>완료 ${sizeText}</span>` : ''}
                                    ${item.status === 'error' ? `<span class="error-msg">${item.message || '오류 발생'}</span>` : ''}
                                    ${item.status === 'cancelled' ? `<span>취소됨</span>` : ''}
                                    ${item.subtitle_status === 'error' ? `<span class="error-msg">자막 오류: ${item.subtitle_error || '자막 생성 실패'}</span>` : ''}
                                    ${item.created_at ? `<span class="date">${formatDate(item.created_at)}</span>` : ''}
                                </div>
                                ${progressBar}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getActionButtons(item) {
            let buttons = '';

            if (item.status === 'completed' && item.filename) {
                buttons += iconButton('download-file-btn content-download-btn', `downloadFile('${item.id}', '${item.type}')`, icons.contentDownload, '컨텐츠 다운로드');
            }

            if (item.type === 'completed') {
                const subtitleStatus = item.subtitle_status || 'none';
                if (subtitleStatus === 'completed') {
                    buttons += iconButton('subtitle-view-btn', `viewSubtitle('${item.id}')`, icons.eye, '자막 보기');
                    buttons += iconButton('subtitle-download-btn', `downloadSubtitle('${item.id}')`, icons.subtitleDownload, '자막 다운로드');
                } else if (subtitleStatus === 'queued' || subtitleStatus === 'processing') {
                    buttons += `<button class="subtitle-processing-btn" disabled>자막 생성 중</button>`;
                } else {
                    buttons += `<button class="subtitle-generate-btn" onclick="generateSubtitle('${item.id}')">자막 생성</button>`;
                }
            }

            if (item.status === 'downloading' || item.status === 'queued') {
                buttons += `<button class="cancel-btn" onclick="cancelDownload('${item.id}')">✕</button>`;
            }

            if (item.status === 'error') {
                buttons += `<button class="retry-btn" onclick="retryDownload('${item.url}')">🔄</button>`;
            }

            if (item.status !== 'downloading' && item.status !== 'queued') {
                const deleteWithFile = item.status === 'completed' ? 'true' : 'false';
                buttons += `<button class="delete-btn" onclick="deleteItem('${item.id}', ${deleteWithFile})">🗑️</button>`;
            }

            return buttons;
        }

        function iconButton(className, onClick, icon, label) {
            return `<button class="${className} icon-btn" onclick="${onClick}" title="${label}" aria-label="${label}">${icon}</button>`;
        }

        function getQualityBadge(quality, format_type) {
            if (format_type === 'audio_mp3') return '🎵 MP3';
            if (format_type === 'audio_m4a') return '🎵 M4A';

            const badges = {
                'best': '⭐ Best',
                '2160p': '4K',
                '1440p': '2K',
                '1080p': '1080p',
                '720p': '720p',
                '480p': '480p',
                '360p': '360p'
            };
            return badges[quality] || quality || '-';
        }

        function updateStatusInfo(total) {
            const filterLabels = {
                'all': '전체',
                'active': '진행중',
                'completed': '완료'
            };
            document.getElementById('status-info').textContent =
                `${filterLabels[currentFilter]}: ${total}건`;
        }

        function renderPagination(page, totalPages) {
            const container = document.getElementById('pagination');

            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = '';
            if (page > 1) {
                html += `<button onclick="goToPage(${page - 1})">◀ 이전</button>`;
            }
            html += `<span class="page-info">${page} / ${totalPages}</span>`;
            if (page < totalPages) {
                html += `<button onclick="goToPage(${page + 1})">다음 ▶</button>`;
            }

            container.innerHTML = html;
        }

        function goToPage(page) {
            currentPage = page;
            loadDownloads();
        }

        async function startDownload() {
            const url = document.getElementById('url').value.trim();
            const quality = document.getElementById('quality').value;
            const format_type = document.getElementById('format').value;

            if (!url) {
                alert('URL을 입력하세요.');
                return;
            }

            const btn = document.querySelector('.input-section button');
            btn.disabled = true;
            btn.textContent = '처리 중...';

            try {
                // 중복 체크
                const dupCheck = await fetch('/api/downloads/check-duplicate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url: url })
                });
                const dupData = await dupCheck.json();

                if (dupData.duplicate) {
                    const existing = dupData.existing;
                    if (!confirm(`이미 다운로드한 영상입니다.\n\n제목: ${existing.video_title}\n품질: ${existing.quality}\n\n다시 다운로드하시겠습니까?`)) {
                        btn.disabled = false;
                        btn.textContent = '다운로드 시작';
                        return;
                    }
                }

                // 다운로드 시작
                const response = await fetch('/download', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url, quality, format_type })
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('url').value = '';
                    setFilter('all');
                    loadDownloads();
                } else {
                    alert('오류: ' + data.error);
                }
            } catch (error) {
                alert('오류: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '다운로드 시작';
            }
        }

        async function cancelDownload(itemId) {
            if (!confirm('다운로드를 취소하시겠습니까?')) return;

            try {
                await fetch(`/cancel/${itemId}`, { method: 'POST' });
                setTimeout(loadDownloads, 500);
            } catch (error) {
                console.error('Cancel error:', error);
            }
        }

        async function deleteItem(itemId, deleteFile = false) {
            let msg = '이 항목을 삭제하시겠습니까?';
            if (deleteFile === true || deleteFile === 'true') {
                msg = '이 항목과 파일을 함께 삭제하시겠습니까?';
            }

            if (!confirm(msg)) return;

            try {
                await fetch(`/api/downloads/${itemId}?delete_file=${deleteFile}`, { method: 'DELETE' });
                loadDownloads();
            } catch (error) {
                console.error('Delete error:', error);
            }
        }

        function downloadFile(itemId, itemType) {
            if (itemType === 'completed') {
                window.location.href = `/download-file-by-history/${itemId}`;
            } else {
                window.location.href = `/download-file/${itemId}`;
            }
        }

        async function generateSubtitle(itemId) {
            try {
                const response = await fetch(`/api/downloads/${itemId}/subtitle`, { method: 'POST' });
                const data = await response.json();
                if (!response.ok) {
                    alert('자막 오류: ' + (data.error || '자막 생성 요청 실패'));
                    return;
                }
                loadDownloads(false);
            } catch (error) {
                alert('자막 오류: ' + error.message);
            }
        }

        function downloadSubtitle(itemId) {
            window.location.href = `/subtitle-file-by-history/${itemId}`;
        }

        async function viewSubtitle(itemId) {
            currentSubtitleId = itemId;
            const viewer = document.getElementById('subtitle-viewer');
            const title = document.getElementById('subtitle-viewer-title');
            const filename = document.getElementById('subtitle-viewer-filename');
            const content = document.getElementById('subtitle-viewer-content');

            title.textContent = '자막';
            filename.textContent = '';
            content.textContent = '불러오는 중...';
            viewer.classList.add('open');
            viewer.setAttribute('aria-hidden', 'false');

            try {
                const response = await fetch(`/api/downloads/${itemId}/subtitle-text`);
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || '자막을 불러오지 못했습니다.');
                }
                title.textContent = data.video_title || '자막';
                filename.textContent = data.subtitle_filename || '';
                content.textContent = data.subtitle_text || '';
            } catch (error) {
                content.textContent = error.message;
            }
        }

        function closeSubtitleViewer() {
            const viewer = document.getElementById('subtitle-viewer');
            viewer.classList.remove('open');
            viewer.setAttribute('aria-hidden', 'true');
        }

        function downloadSubtitleFromViewer() {
            if (currentSubtitleId) {
                downloadSubtitle(currentSubtitleId);
            }
        }

        function retryDownload(url) {
            document.getElementById('url').value = url;
            window.scrollTo(0, 0);
        }

        async function cleanupDownloads() {
            if (!confirm('실패/취소된 항목과 임시 파일을 정리하시겠습니까?')) return;

            try {
                const response = await fetch('/api/downloads/cleanup', { method: 'POST' });
                const data = await response.json();
                alert(data.message);
                loadDownloads();
            } catch (error) {
                alert('정리 오류: ' + error.message);
            }
        }

        function formatSpeed(bytesPerSecond) {
            if (!bytesPerSecond) return '';
            const units = ['B/s', 'KB/s', 'MB/s', 'GB/s'];
            let size = bytesPerSecond;
            let unitIndex = 0;
            while (size >= 1024 && unitIndex < units.length - 1) {
                size /= 1024;
                unitIndex++;
            }
            return `${size.toFixed(1)} ${units[unitIndex]}`;
        }

        function formatFileSize(bytes) {
            if (!bytes) return '';
            const units = ['B', 'KB', 'MB', 'GB'];
            let size = bytes;
            let unitIndex = 0;
            while (size >= 1024 && unitIndex < units.length - 1) {
                size /= 1024;
                unitIndex++;
            }
            return `(${size.toFixed(1)} ${units[unitIndex]})`;
        }

        function formatDate(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            return date.toLocaleString('ko-KR', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function getYoutubeThumbnail(url) {
            if (!url) return null;

            // 유튜브 비디오 ID 추출
            let videoId = null;

            // youtube.com/watch?v=VIDEO_ID
            const watchMatch = url.match(/[?&]v=([^&]+)/);
            if (watchMatch) videoId = watchMatch[1];

            // youtu.be/VIDEO_ID
            if (!videoId) {
                const shortMatch = url.match(/youtu\.be\/([^?&]+)/);
                if (shortMatch) videoId = shortMatch[1];
            }

            // youtube.com/embed/VIDEO_ID
            if (!videoId) {
                const embedMatch = url.match(/embed\/([^?&]+)/);
                if (embedMatch) videoId = embedMatch[1];
            }

            // youtube.com/shorts/VIDEO_ID
            if (!videoId) {
                const shortsMatch = url.match(/shorts\/([^?&]+)/);
                if (shortsMatch) videoId = shortsMatch[1];
            }

            if (videoId) {
                return `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;
            }
            return null;
        }

        // URL 입력창 Enter 키
        document.getElementById('url').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') startDownload();
        });

        // 유튜브 열기
        function openYoutube(url) {
            if (url) window.open(url, '_blank');
        }
    </script>
</body>
</html>
